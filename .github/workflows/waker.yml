name: URL Waker

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier from spinning down
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  wake-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          curl -f -s https://carbonlens-backend.onrender.com/docs > /dev/null || echo "Backend ping failed, but continuing..."
          
      - name: Ping Frontend Vercel App
        run: |
          curl -f -s https://carbonlens-app.vercel.app > /dev/null || echo "Frontend ping failed, but continuing..."
